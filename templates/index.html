<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DecoBot</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #F5F7FA;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: #FFFFFF;
            color: #2C2C2C;
            padding: 16px 20px;
            border-bottom: 1px solid #E4E7EC;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        .header-left {
            display: flex;
            flex-direction: column;
        }

        .header-title {
            font-weight: bold;
            font-size: 18px;
        }

        .header-subtitle {
            font-size: 12px;
            color: #2C2C2C;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: green;
            border-radius: 50%;
        }

        .chat-window {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #FFFFFF;
        }

        .message-row {
            margin-bottom: 16px;
            display: flex;
            flex-direction: column;
        }

        .message-row.user {
            align-items: flex-end;
        }

        .message-row.bot {
            align-items: flex-start;
        }

        .bubble {
            max-width: 70%;
            padding: 10px 15px;
            word-wrap: break-word;
            white-space: pre-wrap;
        }

        .bubble.user {
            background: #4A90D9;
            color: #FFFFFF;
            border-radius: 18px 18px 4px 18px;
        }

        .bubble.bot {
            background: #F0F0F0;
            color: #2C2C2C;
            border-radius: 18px 18px 18px 4px;
        }

        .timestamp {
            font-size: 11px;
            color: #9AA0A6;
            margin-top: 4px;
        }

        .message-row.user .timestamp {
            text-align: right;
        }

        .message-row.bot .timestamp {
            text-align: left;
        }

        .input-bar {
            background: #FFFFFF;
            border-top: 1px solid #E4E7EC;
            padding: 16px;
            display: flex;
            gap: 10px;
            flex-shrink: 0;
        }

        .input-bar input {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid #D0D5DD;
            border-radius: 6px;
            font-family: 'Segoe UI', Arial, sans-serif;
            font-size: 14px;
            background: #FFFFFF;
        }

        .input-bar input:disabled {
            opacity: 0.6;
        }

        .input-bar button {
            background: #4A90D9;
            color: #FFFFFF;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            font-family: 'Segoe UI', Arial, sans-serif;
            font-size: 14px;
            cursor: pointer;
        }

        .input-bar button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-left">
            <span class="header-title">🤖 DecoBot</span>
            <span class="header-subtitle">Rule-Based AI | DecodeLabs 2026</span>
        </div>
        <div class="header-right">
            <span class="status-dot"></span>
            <span>Online</span>
        </div>
    </header>

    <div class="chat-window" id="chatWindow"></div>

    <div class="input-bar">
        <input type="text" id="messageInput" placeholder="Type a message...">
        <button id="sendBtn">Send</button>
    </div>

    <script>
        const chatWindow = document.getElementById('chatWindow');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');

        function formatTime() {
            const now = new Date();
            let hours = now.getHours();
            const minutes = now.getMinutes().toString().padStart(2, '0');
            const ampm = hours >= 12 ? 'PM' : 'AM';
            hours = hours % 12;
            hours = hours ? hours : 12;
            return hours + ':' + minutes + ' ' + ampm;
        }

        function addBubble(text, isUser) {
            const row = document.createElement('div');
            row.className = 'message-row ' + (isUser ? 'user' : 'bot');

            const bubble = document.createElement('div');
            bubble.className = 'bubble ' + (isUser ? 'user' : 'bot');
            bubble.textContent = text;

            const timestamp = document.createElement('div');
            timestamp.className = 'timestamp';
            timestamp.textContent = formatTime();

            row.appendChild(bubble);
            row.appendChild(timestamp);
            chatWindow.appendChild(row);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        function sendMessage() {
            const userText = messageInput.value.trim();
            if (!userText) return;

            addBubble(userText, true);
            messageInput.value = '';

            fetch('/chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({message: userText})
            })
            .then(function(response) {
                return response.json();
            })
            .then(function(data) {
                addBubble(data.reply, false);
                if (data.type === 'exit') {
                    messageInput.disabled = true;
                    sendBtn.disabled = true;
                }
            });
        }

        sendBtn.addEventListener('click', sendMessage);

        messageInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });

        addBubble("Hello! I am DecoBot 🤖 — a Rule-Based AI Chatbot built at DecodeLabs. Type 'help' to see what I can do!", false);
    </script>
</body>
</html>
